services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: papafi
    ports:
      - "5432:5432"
    volumes:
      - papafi_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d papafi"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: papafi
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/papafi
    ports:
      - "5000:5000"
    command: sh -c "npm run migration:run && node dist/index.js"

volumes:
  papafi_postgres:
