openapi: 3.0.3
info:
  title: 'Papafi Backend API'
  version: 1.0.0
  description: 'Papafi wallet backend API for frontend and mobile clients. Documents implemented Express routes only.'
servers:
  -
    url: 'https://api.papifi.com'
  -
    url: 'http://localhost:5000'
tags:
  -
    name: Health
  -
    name: Auth
  -
    name: Profile
  -
    name: KYC
  -
    name: Wallet
  -
    name: Cards
  -
    name: Transactions
  -
    name: Admin
  -
    name: Webhooks
paths:
  /:
    get:
      tags:
        - Health
      summary: 'Root welcome endpoint'
      security: []
      responses:
        '200':
          description: 'Welcome text.'
          content:
            text/plain:
              schema:
                type: string
              example: 'Welcome to the API!'
  /health:
    get:
      tags:
        - Health
      summary: 'Liveness check'
      security: []
      responses:
        '200':
          description: 'Process is running.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              example:
                status: ok
  /ready:
    get:
      tags:
        - Health
      summary: 'Readiness check'
      security: []
      responses:
        '200':
          description: 'Database is reachable.'
          content:
            application/json:
              example:
                status: ready
        '503':
          description: 'Application or database is not ready.'
          content:
            application/json:
              example:
                status: not_ready
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: 'Register a user and send account verification OTP'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              firstName: Ada
              lastName: Okafor
              email: ada.okafor@operator-controlled-domain.tld
              password: DOCS_ONLY_PASSWORD
              gender: female
              phoneNumber: '+2348012345678'
      responses:
        '200':
          $ref: '#/components/responses/RegisterOtpSent'
        '400':
          $ref: '#/components/responses/MessageError'
        '500':
          $ref: '#/components/responses/MessageError'
  /api/auth/verify-otp:
    post:
      tags:
        - Auth
      summary: 'Verify account OTP and issue JWT'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
            example:
              email: ada.okafor@operator-controlled-domain.tld
              otp: '000000'
      responses:
        '200':
          description: 'Account verified.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/MessageError'
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: 'Login with email and password'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: ada.okafor@operator-controlled-domain.tld
              password: DOCS_ONLY_PASSWORD
      responses:
        '200':
          description: 'JWT issued.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/MessageError'
  /api/auth/resend-otp:
    post:
      tags:
        - Auth
      summary: 'Resend account verification OTP'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
            example:
              email: ada.okafor@operator-controlled-domain.tld
      responses:
        '200':
          $ref: '#/components/responses/MessageOk'
        '400':
          $ref: '#/components/responses/MessageError'
  /api/auth/create-pin:
    post:
      tags:
        - Auth
      summary: 'Create or update transaction PIN'
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePinRequest'
            example:
              pin: '0000'
      responses:
        '200':
          $ref: '#/components/responses/MessageOk'
        '400':
          $ref: '#/components/responses/MessageError'
        '401':
          $ref: '#/components/responses/MessageError'
  /api/auth/make-admin:
    post:
      tags:
        - Auth
        - Admin
      summary: 'Grant admin role to a user'
      description: 'Authenticated route. Controller requires requester role to be super_admin.'
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserIdRequest'
            example:
              userId: 11111111-1111-4111-8111-111111111111
      responses:
        '200':
          $ref: '#/components/responses/MessageOk'
        '403':
          $ref: '#/components/responses/MessageError'
        '404':
          $ref: '#/components/responses/MessageError'
  /api/auth/remove-admin:
    post:
      tags:
        - Auth
        - Admin
      summary: 'Remove admin role from a user'
      description: 'Authenticated route. Controller requires requester role to be super_admin.'
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserIdRequest'
            example:
              userId: 11111111-1111-4111-8111-111111111111
      responses:
        '200':
          $ref: '#/components/responses/MessageOk'
        '403':
          $ref: '#/components/responses/MessageError'
        '404':
          $ref: '#/components/responses/MessageError'
  /api/auth/forgot-password:
    post:
      tags:
        - Auth
      summary: 'Request password reset OTP'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
            example:
              email: ada.okafor@operator-controlled-domain.tld
      responses:
        '200':
          description: 'Generic OTP response to avoid account enumeration.'
          content:
            application/json:
              example:
                message: 'If the account can receive this request, an OTP has been sent.'
  /api/auth/reset-password:
    post:
      tags:
        - Auth
      summary: 'Reset password with password reset OTP'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            example:
              email: ada.okafor@operator-controlled-domain.tld
              otp: '000000'
              newPassword: DOCS_ONLY_NEW_PASSWORD
      responses:
        '200':
          $ref: '#/components/responses/MessageOk'
        '400':
          $ref: '#/components/responses/MessageError'
  /api/auth/reset-passwordOtp:
    post:
      tags:
        - Auth
      summary: 'Verify password reset OTP without changing password'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
            example:
              email: ada.okafor@operator-controlled-domain.tld
              otp: '000000'
      responses:
        '200':
          $ref: '#/components/responses/MessageOk'
        '400':
          $ref: '#/components/responses/MessageError'
  /api/profile:
    get:
      tags:
        - Profile
      summary: 'Get authenticated user''s profile'
      security:
        -
          bearerAuth: []
      responses:
        '200':
          description: 'Profile returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/MessageError'
    put:
      tags:
        - Profile
      summary: 'Update authenticated user''s profile'
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
            example:
              gender: female
              phoneNumber: '+2348012345678'
              country: NG
              nationality: Nigerian
              dateOfBirth: '1995-04-12'
              address: '12 Example Road, Lagos'
      responses:
        '200':
          description: 'Updated profile object.'
        '401':
          $ref: '#/components/responses/MessageError'
  /api/profile/change-password:
    put:
      tags:
        - Profile
      summary: 'Change authenticated user''s password'
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
            example:
              currentPassword: DOCS_ONLY_CURRENT_PASSWORD
              newPassword: DOCS_ONLY_NEW_PASSWORD
      responses:
        '200':
          $ref: '#/components/responses/MessageOk'
        '400':
          $ref: '#/components/responses/MessageError'
  /api/kyc/start:
    post:
      tags:
        - KYC
      summary: 'Start KYC guidance flow'
      security:
        -
          bearerAuth: []
      responses:
        '200':
          description: 'KYC provider and allowed documents.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycStartResponse'
      requestBody:
        required: false
        description: 'This operation does not consume input fields. Send an empty JSON object if a body is required by the client.'
        content:
          application/json:
            schema:
              type: object
              maxProperties: 0
            example: {}
  /api/kyc/bvn:
    post:
      tags:
        - KYC
      summary: 'Verify BVN with Maplerad'
      security:
        -
          bearerAuth: []
      description: 'BVN is sent to the backend only. Do not log it in clients.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BvnRequest'
            example:
              bvn: '00000000000'
      responses:
        '200':
          description: 'BVN verification result.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycResultResponse'
        '400':
          $ref: '#/components/responses/MessageError'
        '502':
          $ref: '#/components/responses/MessageError'
  /api/kyc/documents:
    post:
      tags:
        - KYC
      summary: 'Submit KYC document metadata'
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KycDocumentRequest'
            example:
              documentType: INTERNATIONAL_PASSPORT
              documentNumber: DOCS-ONLY-PASSPORT
              frontImageUrl: 'https://example.com/uploads/passport-front.jpg'
              selfieImageUrl: 'https://example.com/uploads/selfie.jpg'
              issuedCountry: NG
              expiresAt: '2030-12-31'
      responses:
        '201':
          description: 'Document metadata stored.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycDocumentResponse'
        '400':
          $ref: '#/components/responses/MessageError'
  /api/kyc/status:
    get:
      tags:
        - KYC
      summary: 'Get authenticated user''s KYC status'
      security:
        -
          bearerAuth: []
      responses:
        '200':
          description: 'KYC status list.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycStatusResponse'
  /api/wallet/webhook:
    post:
      tags:
        - Webhooks
      summary: 'Maplerad provider callback'
      description: 'Unauthenticated provider callback. Authenticity is checked with Maplerad/Svix svix-id, svix-timestamp, and svix-signature headers over the exact raw body. Provider private payloads are not documented.'
      security: []
      parameters:
        -
          $ref: '#/components/parameters/SvixId'
        -
          $ref: '#/components/parameters/SvixTimestamp'
        -
          $ref: '#/components/parameters/SvixSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapleradWebhookRequest'
            example:
              id: evt_docs_01
              event: collection.successful
              data:
                reference: deposit_docs_01
                customer_id: customer_docs_01
                amount: 500000
                currency: NGN
                status: success
      responses:
        '200':
          description: 'Webhook accepted, ignored, or duplicate.'
          content:
            application/json:
              examples:
                accepted:
                  value: {ok: true, duplicate: false}
                ignored:
                  value: {ok: true, ignored: true}
        '400':
          $ref: '#/components/responses/OkFalseError'
        '401':
          $ref: '#/components/responses/OkFalseError'
        '500':
          $ref: '#/components/responses/OkFalseError'
  '/api/wallet/create/{userId}':
    post:
      tags:
        - Wallet
      summary: 'Create NGN wallet and virtual account'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: 'Existing wallet returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletResponse'
        '201':
          description: 'Wallet created.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletResponse'
        '403':
          $ref: '#/components/responses/OkFalseError'
      requestBody:
        required: false
        description: 'This operation does not consume input fields. Send an empty JSON object if a body is required by the client.'
        content:
          application/json:
            schema:
              type: object
              maxProperties: 0
            example: {}
  '/api/wallet/create-usd/{userId}':
    post:
      tags:
        - Wallet
      summary: 'Request USD virtual account'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/UserIdPath'
      responses:
        '201':
          description: 'USD account request returned from provider.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsdAccountRequestResponse'
        '400':
          $ref: '#/components/responses/OkFalseError'
        '403':
          $ref: '#/components/responses/OkFalseError'
      requestBody:
        required: false
        description: 'This operation does not consume input fields. Send an empty JSON object if a body is required by the client.'
        content:
          application/json:
            schema:
              type: object
              maxProperties: 0
            example: {}
  '/api/wallet/balance/{userId}':
    get:
      tags:
        - Wallet
      summary: 'List authenticated user''s wallets and balances'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: 'Wallets returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletListResponse'
        '403':
          $ref: '#/components/responses/OkFalseError'
  /api/wallet/withdraw:
    post:
      tags:
        - Wallet
      summary: 'Withdraw from wallet to bank account'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawRequest'
            example:
              amount: 5000
              currency: NGN
              bankCode: '000013'
              accountNumber: '0000000000'
              accountName: 'Ada Okafor'
              description: 'Wallet withdrawal'
              transactionPin: '0000'
      responses:
        '200':
          description: 'Withdrawal submitted or duplicate returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionProviderResponse'
        '400':
          $ref: '#/components/responses/OkFalseError'
        '403':
          $ref: '#/components/responses/OkFalseError'
        '502':
          $ref: '#/components/responses/OkFalseError'
  /api/wallet/cards/create:
    post:
      tags:
        - Cards
      summary: 'Create a virtual card'
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCardRequest'
            example:
              walletId: 22222222-2222-4222-8222-222222222222
              currency: USD
      responses:
        '200':
          description: 'Safe card metadata. PAN/CVV are not returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardResponse'
        '400':
          $ref: '#/components/responses/OkFalseError'
        '404':
          $ref: '#/components/responses/OkFalseError'
  '/api/wallet/cards/{id}/fund':
    post:
      tags:
        - Cards
      summary: 'Fund a virtual card from wallet balance'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/CardIdPath'
        -
          $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardMoneyMovementRequest'
            example:
              amount: 25
              currency: USD
              transactionPin: '0000'
      responses:
        '200':
          description: 'Card funding submitted or duplicate returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionProviderResponse'
        '400':
          $ref: '#/components/responses/OkFalseError'
        '403':
          $ref: '#/components/responses/OkFalseError'
  '/api/wallet/cards/{id}/withdraw':
    post:
      tags:
        - Cards
      summary: 'Withdraw funds from card to wallet'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/CardIdPath'
        -
          $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardMoneyMovementRequest'
            example:
              amount: 10
              currency: USD
              transactionPin: '0000'
      responses:
        '200':
          description: 'Wallet credited from card withdrawal.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionProviderResponse'
        '400':
          $ref: '#/components/responses/OkFalseError'
        '403':
          $ref: '#/components/responses/OkFalseError'
  '/api/wallet/cards/{id}/freeze':
    post:
      tags:
        - Cards
      summary: 'Freeze an owned virtual card'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/CardIdPath'
      responses:
        '200':
          description: 'Card frozen.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardMessageResponse'
        '404':
          $ref: '#/components/responses/OkFalseError'
      requestBody:
        required: false
        description: 'This operation does not consume input fields. Send an empty JSON object if a body is required by the client.'
        content:
          application/json:
            schema:
              type: object
              maxProperties: 0
            example: {}
  '/api/wallet/cards/{id}/unfreeze':
    post:
      tags:
        - Cards
      summary: 'Unfreeze an owned virtual card'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/CardIdPath'
      responses:
        '200':
          description: 'Card unfrozen.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardMessageResponse'
        '404':
          $ref: '#/components/responses/OkFalseError'
      requestBody:
        required: false
        description: 'This operation does not consume input fields. Send an empty JSON object if a body is required by the client.'
        content:
          application/json:
            schema:
              type: object
              maxProperties: 0
            example: {}
  /api/transaction:
    get:
      tags:
        - Transactions
      summary: 'List wallet and optional card transactions'
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: walletId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        -
          name: cardId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        -
          name: type
          in: query
          required: false
          schema:
            type: string
            enum:
              - sent
              - received
        -
          name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
        -
          name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 'Transactions returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'
        '403':
          $ref: '#/components/responses/OkFalseError'
  /api/transaction/log:
    post:
      tags:
        - Transactions
      summary: 'Internal wallet transfer'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalTransferRequest'
            example:
              senderWalletId: 22222222-2222-4222-8222-222222222222
              recipientWalletId: 33333333-3333-4333-8333-333333333333
              amount: 1000
              currency: NGN
              description: 'Wallet transfer'
              transactionPin: '0000'
      responses:
        '200':
          description: 'Duplicate transfer retry returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDuplicateResponse'
        '201':
          description: 'Transfer created.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDuplicateResponse'
        '400':
          $ref: '#/components/responses/OkFalseError'
        '403':
          $ref: '#/components/responses/OkFalseError'
  /api/admin/audit-logs:
    get:
      tags:
        - Admin
      summary: 'List sanitized audit logs'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/PageQuery'
        -
          $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: 'Paginated audit logs.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedItemsResponse'
        '403':
          $ref: '#/components/responses/MessageError'
  /api/admin/risk-flags:
    get:
      tags:
        - Admin
      summary: 'List open risk flags'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/PageQuery'
        -
          $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: 'Paginated open risk flags.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedItemsResponse'
        '403':
          $ref: '#/components/responses/MessageError'
  /api/admin/reconciliation:
    get:
      tags:
        - Admin
      summary: 'List stale provider transactions for reconciliation'
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: thresholdMinutes
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: 'Reconciliation queue.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationResponse'
        '403':
          $ref: '#/components/responses/MessageError'
  '/api/admin/transactions/{id}/manual-review':
    post:
      tags:
        - Admin
      summary: 'Mark transaction for manual review'
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualReviewRequest'
            example:
              notes: 'Provider status requires manual review.'
      responses:
        '200':
          description: 'Transaction marked for review.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '404':
          $ref: '#/components/responses/OkFalseError'
  '/api/admin/users/{userId}/wallet-summary':
    get:
      tags:
        - Admin
      summary: 'Get a user''s wallet summary'
      security:
        -
          bearerAuth: []
      parameters:
        -
          $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: 'Wallet summary.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminWalletSummaryResponse'
        '403':
          $ref: '#/components/responses/MessageError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: 'Required for money movement endpoints. Must be a stable unique string of at least 8 characters per client operation. The backend also accepts idempotencyKey in JSON body.'
      schema:
        type: string
        minLength: 8
      example: money_move_docs_01
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CardIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    SvixId:
      name: svix-id
      in: header
      required: true
      description: 'Maplerad webhook message identifier. Reused when the same webhook is retried.'
      schema:
        type: string
      example: msg_docs_01
    SvixTimestamp:
      name: svix-timestamp
      in: header
      required: true
      description: 'Unix timestamp in seconds used for replay protection.'
      schema:
        type: string
      example: '1760000000'
    SvixSignature:
      name: svix-signature
      in: header
      required: true
      description: 'Space-delimited Maplerad/Svix HMAC-SHA256 signatures, usually prefixed with a version such as v1,.'
      schema:
        type: string
      example: 'v1,DOCS_ONLY_SIGNATURE'
  responses:
    MessageOk:
      description: 'Message response.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: 'Operation completed successfully.'
    MessageError:
      description: 'Error response.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: 'Authentication required'
    OkFalseError:
      description: 'Error response.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OkFalseError'
          example:
            ok: false
            message: 'Invalid transaction PIN'
    RegisterOtpSent:
      description: 'OTP sent.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: 'OTP sent to your email. Please verify to complete registration.'
  schemas:
    Currency:
      type: string
      enum:
        - NGN
        - USD
        - GBP
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    OkFalseError:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        message:
          type: string
      required:
        - ok
        - message
    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RegisterRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
        - gender
        - phoneNumber
      properties:
        firstName:
          type: string
          example: Ada
        lastName:
          type: string
          example: Okafor
        email:
          type: string
          format: email
          example: ada.okafor@operator-controlled-domain.tld
        password:
          type: string
          format: password
        gender:
          type: string
          example: female
        phoneNumber:
          type: string
          example: '+2348012345678'
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: ada.okafor@operator-controlled-domain.tld
        password:
          type: string
          format: password
    EmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: ada.okafor@operator-controlled-domain.tld
    OtpVerifyRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          description: 'One-time password entered by the user. Never log this value.'
          writeOnly: true
    CreatePinRequest:
      type: object
      required:
        - pin
      properties:
        pin:
          type: string
          pattern: '^\d{4}$'
          description: 'Four digit transaction PIN. Never log this value.'
          writeOnly: true
    ResetPasswordRequest:
      type: object
      required:
        - email
        - otp
        - newPassword
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          writeOnly: true
        newPassword:
          type: string
          format: password
    UserIdRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid
    AuthTokenResponse:
      type: object
      properties:
        token:
          type: string
          example: jwt_token
        message:
          type: string
      required:
        - token
        - message
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: jwt_token
        userId:
          type: string
          format: uuid
        message:
          type: string
      required:
        - token
        - userId
        - message
    Profile:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        gender:
          type: string
        phoneNumber:
          type: string
          nullable: true
        nationality:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
    ProfileUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        gender:
          type: string
        phoneNumber:
          type: string
        country:
          type: string
          example: NG
        nationality:
          type: string
        dateOfBirth:
          type: string
          format: date
        address:
          type: string
    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
    KycStartResponse:
      type: object
      properties:
        message:
          type: string
        provider:
          type: string
          example: maplerad
        documentTypes:
          type: array
          items:
            type: string
            enum:
              - NIN
              - DRIVERS_LICENSE
              - INTERNATIONAL_PASSPORT
              - VOTERS_CARD
    BvnRequest:
      type: object
      required:
        - bvn
      properties:
        bvn:
          type: string
          pattern: '^\d{11}$'
          description: '11 digit BVN. Do not store or log in frontend/mobile clients.'
          writeOnly: true
    KycResultResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
          example: BVN_VERIFIED
        status:
          type: string
          enum:
            - PASSED
            - FAILED
        verificationId:
          type: string
          format: uuid
        reused:
          type: boolean
    KycDocumentRequest:
      type: object
      required:
        - documentType
      properties:
        documentType:
          type: string
          enum:
            - NIN
            - DRIVERS_LICENSE
            - INTERNATIONAL_PASSPORT
            - VOTERS_CARD
        documentNumber:
          type: string
        frontImageUrl:
          type: string
          format: uri
        backImageUrl:
          type: string
          format: uri
        selfieImageUrl:
          type: string
          format: uri
        issuedCountry:
          type: string
          example: NG
        expiresAt:
          type: string
          format: date
    KycDocumentResponse:
      type: object
      properties:
        message:
          type: string
        verificationId:
          type: string
          format: uuid
        status:
          type: string
          example: PENDING
    KycStatusResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        verifications:
          type: array
          items:
            $ref: '#/components/schemas/KycVerificationSummary'
    Wallet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mapleradAccountId:
          type: string
          nullable: true
        accountNumber:
          type: string
          nullable: true
        bankName:
          type: string
          nullable: true
        currency:
          $ref: '#/components/schemas/Currency'
        balance:
          type: string
          example: '0.00'
        availableBalance:
          type: string
          example: '0.00'
        pendingBalance:
          type: string
          example: '0.00'
        ledgerBalance:
          type: string
          example: '0.00'
        usdAccountId:
          type: string
          nullable: true
        usdAccountStatus:
          type: string
          enum:
            - pending
            - approved
            - rejected
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    WalletResponse:
      type: object
      properties:
        ok:
          type: boolean
        wallet:
          $ref: '#/components/schemas/Wallet'
    WalletListResponse:
      type: object
      properties:
        ok:
          type: boolean
        wallets:
          type: array
          items:
            $ref: '#/components/schemas/Wallet'
    UsdAccountRequestResponse:
      type: object
      properties:
        ok:
          type: boolean
        usdAccountRequest:
          type: object
          additionalProperties: true
          example:
            reference: usd_account_request_reference
            status: pending
    WithdrawRequest:
      type: object
      required:
        - amount
        - currency
        - bankCode
        - accountNumber
        - transactionPin
      properties:
        amount:
          type: number
          example: 5000
        currency:
          $ref: '#/components/schemas/Currency'
        bankCode:
          type: string
          example: bank_code
        accountNumber:
          type: string
          description: 'Recipient bank account number.'
        accountName:
          type: string
          example: 'Ada Okafor'
        description:
          type: string
        transactionPin:
          type: string
          writeOnly: true
        idempotencyKey:
          type: string
          description: 'Optional body fallback for Idempotency-Key header.'
    CreateCardRequest:
      type: object
      required:
        - walletId
        - currency
      properties:
        walletId:
          type: string
          format: uuid
        currency:
          $ref: '#/components/schemas/Currency'
    CardMoneyMovementRequest:
      type: object
      required:
        - amount
        - currency
        - transactionPin
      properties:
        amount:
          type: number
          example: 25
        currency:
          $ref: '#/components/schemas/Currency'
        transactionPin:
          type: string
          writeOnly: true
        idempotencyKey:
          type: string
    Card:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mapleradCardId:
          type: string
          nullable: true
        cardLast4:
          type: string
          nullable: true
        expirationDate:
          type: string
          nullable: true
        brand:
          type: string
          nullable: true
        currency:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
            - blocked
        isFrozen:
          type: boolean
        createdAt:
          type: string
          format: date-time
    CardResponse:
      type: object
      properties:
        ok:
          type: boolean
        card:
          $ref: '#/components/schemas/Card'
    CardMessageResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
        card:
          $ref: '#/components/schemas/Card'
    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        senderWalletId:
          type: string
          format: uuid
          nullable: true
        recipientWalletId:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          enum:
            - deposit
            - withdrawal
            - transfer
        amount:
          type: string
          example: '5000.00'
        currency:
          $ref: '#/components/schemas/Currency'
        status:
          type: string
        reference:
          type: string
          nullable: true
        provider:
          type: string
          nullable: true
        providerReference:
          type: string
          nullable: true
        providerStatus:
          type: string
          nullable: true
        reconciliationStatus:
          type: string
        createdAt:
          type: string
          format: date-time
    TransactionProviderResponse:
      type: object
      properties:
        ok:
          type: boolean
        transaction:
          $ref: '#/components/schemas/Transaction'
        provider:
          type: object
          properties:
            reference:
              type: string
            status:
              type: string
        duplicate:
          type: boolean
    InternalTransferRequest:
      type: object
      required:
        - senderWalletId
        - recipientWalletId
        - amount
        - currency
        - transactionPin
      properties:
        senderWalletId:
          type: string
          format: uuid
        recipientWalletId:
          type: string
          format: uuid
        amount:
          type: number
          example: 1000
        currency:
          $ref: '#/components/schemas/Currency'
        description:
          type: string
        transactionPin:
          type: string
          writeOnly: true
        idempotencyKey:
          type: string
    TransactionDuplicateResponse:
      type: object
      properties:
        ok:
          type: boolean
        transaction:
          $ref: '#/components/schemas/Transaction'
        duplicate:
          type: boolean
    TransactionListResponse:
      type: object
      properties:
        ok:
          type: boolean
        count:
          type: integer
        transactions:
          type: array
          items:
            type: object
            additionalProperties: true
    PaginatedItemsResponse:
      type: object
      properties:
        ok:
          type: boolean
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            type: object
            additionalProperties: true
    ReconciliationResponse:
      type: object
      properties:
        ok:
          type: boolean
        count:
          type: integer
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
    ManualReviewRequest:
      type: object
      properties:
        notes:
          type: string
          example: 'Provider status requires manual review.'
    TransactionResponse:
      type: object
      properties:
        ok:
          type: boolean
        transaction:
          $ref: '#/components/schemas/Transaction'
    AdminWalletSummaryResponse:
      type: object
      properties:
        ok:
          type: boolean
        userId:
          type: string
          format: uuid
        wallets:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              currency:
                $ref: '#/components/schemas/Currency'
              availableBalance:
                type: string
              pendingBalance:
                type: string
              ledgerBalance:
                type: string
              accountNumber:
                type: string
                nullable: true
              bankName:
                type: string
                nullable: true
    MapleradWebhookRequest:
      type: object
      required:
        - id
        - event
        - data
      properties:
        id:
          type: string
          description: 'Provider event identifier.'
        event:
          type: string
          description: 'Maplerad event name.'
        data:
          type: object
          additionalProperties: true
    KycVerificationSummary:
      oneOf:
        -
          $ref: '#/components/schemas/KycBvnSummary'
        -
          $ref: '#/components/schemas/KycDocumentSummary'
    KycBvnSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - BVN
        status:
          type: string
          enum:
            - PENDING
            - PASSED
            - FAILED
        provider:
          type: string
          example: maplerad
        providerEnvironment:
          type: string
          enum:
            - sandbox
            - production
        providerRequestId:
          type: string
        bvn:
          type: object
          additionalProperties: false
          properties:
            last4:
              type: string
              example: '7891'
        createdAt:
          type: string
          format: date-time
        verifiedAt:
          type: string
          format: date-time
        attemptCount:
          type: integer
          minimum: 1
    KycDocumentSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - NIN
            - DRIVERS_LICENSE
            - INTERNATIONAL_PASSPORT
            - VOTERS_CARD
        status:
          type: string
          enum:
            - PENDING
            - PASSED
            - FAILED
        issuedCountry:
          type: string
          example: NG
        expiresAt:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
        attemptCount:
          type: integer
          minimum: 1
