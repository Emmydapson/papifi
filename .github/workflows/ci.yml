name: CI

on:
  push:
  pull_request:

jobs:
  build-test-migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: papafi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d papafi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: papafi_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/papafi_test
      POSTGRES_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/papafi_test
      JWT_SECRET: ci-jwt-secret-change-in-prod
      SESSION_SECRET: ci-session-secret-change-in-prod
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 465
      SMTP_USER: ci@example.com
      SMTP_PASS: ci-placeholder
      SMTP_FROM_EMAIL: no-reply@example.com
      MAPLERAD_SECRET_KEY: ci-placeholder
      MAPLERAD_PUBLIC_KEY: ci-placeholder
      MAPLERAD_WEBHOOK_SECRET: ci-placeholder
      CORS_ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run migration:show
